openapi: 3.0.3
info:
  title: HIRING AI SUITE API
  version: 1.0.0
  description: OpenAPI definitions expand per phase. Live UI at /api-docs.

paths:
  /api/v1/auth/register:
    post:
      summary: Register organization and admin user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [organizationName, email, password]
              properties:
                organizationName: { type: string }
                email: { type: string, format: email }
                password: { type: string, format: password }
                firstName: { type: string }
                lastName: { type: string }
      responses:
        '201':
          description: Registered and authenticated
  /api/v1/auth/login:
    post:
      summary: Login
      tags: [Auth]
      security: []
      responses:
        '200':
          description: Returns accessToken; sets refresh cookie
  /api/v1/auth/me:
    get:
      summary: Current user profile
      tags: [Auth]
      responses:
        '200':
          description: Authenticated user
  /api/v1/health:
    get:
      summary: Liveness check
      tags: [Health]
      security: []
      responses:
        '200':
          description: API is running
  /api/v1/health/ready:
    get:
      summary: Readiness check (DB + Redis)
      tags: [Health]
      security: []
      responses:
        '200':
          description: All dependencies healthy
        '503':
          description: One or more dependencies unavailable
