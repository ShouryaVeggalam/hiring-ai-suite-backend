# Render Infrastructure-as-Code for Hiring AI Suite Backend
#
# Deploys a single Web Service that runs both the HTTP API and the BullMQ
# workers in one Node process (good for Render's free plan).
#
# Storage: Cloudflare R2 (S3-compatible). Set the S3_* secrets below.
#
# After importing via Render Blueprint, fill in every env var marked sync:false
# in the Render dashboard (see docs/DEPLOY.md for where to copy each value).

services:
  - type: web
    name: hiring-ai-suite-api
    runtime: node
    plan: free
    rootDir: backend
    region: oregon
    branch: main
    # NODE_ENV=production is set below; without --include=dev, prisma/tsc are not installed.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: API_PREFIX
        value: /api/v1
      - key: APP_NAME
        value: hiring-ai-suite
      - key: LOG_LEVEL
        value: info
      - key: TRUST_PROXY
        value: "true"
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: PASSWORD_RESET_TTL
        value: 30m
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: JWT_REFRESH_COOKIE_NAME
        value: refreshToken
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: none
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "120"
      - key: AUTH_RATE_LIMIT_MAX
        value: "20"
      - key: STORAGE_DRIVER
        value: s3
      - key: S3_REGION
        value: auto
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: S3_SIGNED_URL_TTL
        value: "900"
      - key: UPLOAD_MAX_BYTES
        value: "10485760"
      - key: UPLOAD_ALLOWED_MIME
        value: "application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
      - key: VIRUS_SCAN_ENABLED
        value: "false"
      - key: QUEUE_PREFIX
        value: hiring-ai
      - key: QUEUE_DEFAULT_ATTEMPTS
        value: "3"
      - key: QUEUE_DEFAULT_BACKOFF_MS
        value: "5000"
      - key: WORKER_CONCURRENCY
        value: "2"
      - key: AI_PROVIDER
        value: mock
      - key: EMAIL_PROVIDER
        value: console
      - key: EMAIL_FROM
        value: "Hiring AI Suite <no-reply@example.com>"
      - key: METRICS_ENABLED
        value: "true"
      - key: SWAGGER_ENABLED
        value: "true"
      - key: REQUEST_TIMEOUT_MS
        value: "30000"
      - key: REDIS_TLS
        value: "true"
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: WEBHOOK_SIGNING_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
